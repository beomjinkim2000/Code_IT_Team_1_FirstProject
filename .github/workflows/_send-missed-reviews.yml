name: _send-missed-reviews (일회용 — 실행 후 삭제)

on:
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Send missed PR #45 inline review comments to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          PR_TITLE="[#16] evaluate 구현 (engine/evaluate.py)"
          PR_URL="https://github.com/beomjinkim2000/Code_IT_Team_1_FirstProject/pull/45"
          AUTHOR="beomjinkim2000"

          send() {
            local body="$1"
            local comment_url="$2"
            local time="$3"

            PAYLOAD=$(jq -n \
              --arg title "💬 PR 코드에 인라인 댓글이 달렸습니다" \
              --arg desc "[${PR_TITLE}](${comment_url})" \
              --arg author "$AUTHOR" \
              --arg body "$body" \
              --arg time "$time" \
              '{
                embeds: [{
                  title: $title,
                  description: $desc,
                  color: 16776960,
                  fields: [
                    {"name": "리뷰어", "value": $author, "inline": true},
                    {"name": "시각", "value": $time, "inline": true},
                    {"name": "내용", "value": ("||" + ($body | .[0:200]) + "||"), "inline": false}
                  ],
                  footer: {"text": "GitHub Actions — 누락 알림 재전송"}
                }]
              }')

            curl -s -H "Content-Type: application/json" -X POST -d "$PAYLOAD" "$DISCORD_WEBHOOK_URL"
            sleep 1
          }

          send "evaluate.py는 이미 postprocess된 prediction리스트를 받아야합니다. 근데 지금은 model을 직접 호출하면 predict.py와 postprocess.py의 중간단계를 건너뛰게 됩니다. 해결법: model을 직접호출하지않고 postprocessed predictions를 입력으로 받도록 바꿔야합니다!" \
               "https://github.com/beomjinkim2000/Code_IT_Team_1_FirstProject/pull/45#discussion_r3298577079" \
               "14:05"

          send "baseline.py가 바뀌었었습니다! main버전으로 사용하겠습니다." \
               "https://github.com/beomjinkim2000/Code_IT_Team_1_FirstProject/pull/45#discussion_r3298626772" \
               "14:16"

          send "이것도 main의 baseline.py가 바뀌면서 main이 바뀌었습니다!" \
               "https://github.com/beomjinkim2000/Code_IT_Team_1_FirstProject/pull/45#discussion_r3298628541" \
               "14:17"

          send "마찬가지로 main이 바뀌었습니다!" \
               "https://github.com/beomjinkim2000/Code_IT_Team_1_FirstProject/pull/45#discussion_r3298629419" \
               "14:17"

          send "model.eval(), torch.no_grad()가 잘못쓰인건 아니지만 인터페이스 설계할때 evaluate.py가 모델을 직접 부르도록하지 않아서 postprocess된 predictions를 입력으로 받도록하면 해결이 될것같습니다!" \
               "https://github.com/beomjinkim2000/Code_IT_Team_1_FirstProject/pull/45#discussion_r3298643039" \
               "14:20"
