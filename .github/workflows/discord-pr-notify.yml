name: Discord PR Notification

on:
  pull_request:
    types: [opened, reopened, closed]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          EVENT="${{ github.event_name }}"
          ACTION="${{ github.event.action }}"
          MERGED="${{ github.event.pull_request.merged }}"

          if [ "$EVENT" = "pull_request" ] && [ "$ACTION" = "closed" ] && [ "$MERGED" = "true" ]; then
            TITLE="✅ PR이 머지됐습니다!"
            COLOR=3066993
            DESC="[${{ github.event.pull_request.title }}](${{ github.event.pull_request.html_url }})"
            EXTRA_FIELD=", { \"name\": \"머지한 사람\", \"value\": \"${{ github.event.pull_request.merged_by.login }}\", \"inline\": true }"

          elif [ "$EVENT" = "pull_request" ] && [ "$ACTION" = "closed" ]; then
            exit 0

          elif [ "$EVENT" = "pull_request_review" ]; then
            STATE="${{ github.event.review.state }}"
            if [ "$STATE" = "approved" ]; then
              TITLE="✅ PR이 승인됐습니다!"
              COLOR=3066993
            elif [ "$STATE" = "changes_requested" ]; then
              TITLE="🔁 변경 요청이 달렸습니다"
              COLOR=15158332
            else
              TITLE="💬 PR에 리뷰가 달렸습니다"
              COLOR=16776960
            fi
            DESC="[${{ github.event.pull_request.title }}](${{ github.event.review.html_url }})"
            EXTRA_FIELD=", { \"name\": \"리뷰어\", \"value\": \"${{ github.event.review.user.login }}\", \"inline\": true }"

          elif [ "$EVENT" = "pull_request_review_comment" ]; then
            TITLE="💬 PR 코드에 리뷰 댓글이 달렸습니다"
            COLOR=16776960
            DESC="[${{ github.event.pull_request.title }}](${{ github.event.comment.html_url }})"
            EXTRA_FIELD=", { \"name\": \"작성자\", \"value\": \"${{ github.event.comment.user.login }}\", \"inline\": true }"

          else
            TITLE="🔔 새 PR이 열렸습니다!"
            COLOR=5814783
            DESC="[${{ github.event.pull_request.title }}](${{ github.event.pull_request.html_url }})"
            EXTRA_FIELD=""
          fi

          curl -H "Content-Type: application/json" \
            -X POST \
            -d "{
              \"embeds\": [{
                \"title\": \"$TITLE\",
                \"description\": \"$DESC\",
                \"color\": $COLOR,
                \"fields\": [
                  { \"name\": \"작성자\", \"value\": \"${{ github.event.pull_request.user.login }}\", \"inline\": true }
                  $EXTRA_FIELD,
                  { \"name\": \"브랜치\", \"value\": \"\`${{ github.event.pull_request.head.ref }}\` → \`${{ github.event.pull_request.base.ref }}\`\", \"inline\": false },
                  { \"name\": \"리포지토리\", \"value\": \"${{ github.repository }}\", \"inline\": false }
                ],
                \"footer\": { \"text\": \"GitHub Actions\" }
              }]
            }" \
            "$DISCORD_WEBHOOK_URL"
