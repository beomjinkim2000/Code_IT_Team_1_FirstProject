name: Discord PR Notification

on:
  pull_request:
    types: [opened, reopened, closed, synchronize]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Discord 알림 없이 로그만 출력 (테스트용)'
        required: false
        default: 'false'
        type: boolean

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_MERGED_BY: ${{ github.event.pull_request.merged_by.login }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          REVIEW_STATE: ${{ github.event.review.state }}
          REVIEW_URL: ${{ github.event.review.html_url }}
          REVIEW_BODY: ${{ github.event.review.body }}
          REVIEW_USER: ${{ github.event.review.user.login }}
          COMMENT_URL: ${{ github.event.comment.html_url }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_USER: ${{ github.event.comment.user.login }}
          GH_EVENT_NAME: ${{ github.event_name }}
          GH_ACTION: ${{ github.event.action }}
          GH_MERGED: ${{ github.event.pull_request.merged }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          EVENT="$GH_EVENT_NAME"
          ACTION="$GH_ACTION"
          MERGED="$GH_MERGED"

          if [ "$EVENT" = "workflow_dispatch" ]; then
            TITLE="📝 오늘의 협업노트를 작성해주세요!"
            COLOR=3447003
            DESC="매일 19시 협업노트 작성 리마인더입니다. 오늘 작업 내용을 기록해주세요."
            EXTRA_NAME=""
            EXTRA_VALUE=""
            RAW_BODY=""

          elif [ "$EVENT" = "pull_request" ] && [ "$ACTION" = "closed" ] && [ "$MERGED" = "true" ]; then
            TITLE="✅ PR이 머지됐습니다!"
            COLOR=3066993
            DESC="[${PR_TITLE}](${PR_URL})"
            EXTRA_NAME="머지한 사람"
            EXTRA_VALUE="${PR_MERGED_BY}"
            RAW_BODY="$PR_BODY"

          elif [ "$EVENT" = "pull_request" ] && [ "$ACTION" = "closed" ]; then
            exit 0

          elif [ "$EVENT" = "pull_request_review" ]; then
            STATE="$REVIEW_STATE"
            if [ "$STATE" = "approved" ]; then
              TITLE="✅ PR이 승인됐습니다!"
              COLOR=3066993
            elif [ "$STATE" = "changes_requested" ]; then
              TITLE="🔁 변경 요청이 달렸습니다"
              COLOR=15158332
            else
              TITLE="💬 PR에 리뷰가 달렸습니다"
              COLOR=16776960
            fi
            DESC="[${PR_TITLE}](${REVIEW_URL})"
            EXTRA_NAME="리뷰어"
            EXTRA_VALUE="${REVIEW_USER}"
            RAW_BODY="$REVIEW_BODY"

          elif [ "$EVENT" = "pull_request_review_comment" ]; then
            TITLE="💬 PR 코드에 인라인 댓글이 달렸습니다"
            COLOR=16776960
            DESC="[${PR_TITLE}](${COMMENT_URL})"
            EXTRA_NAME="리뷰어"
            EXTRA_VALUE="${COMMENT_USER}"
            RAW_BODY="$COMMENT_BODY"

          elif [ "$EVENT" = "pull_request" ] && [ "$ACTION" = "synchronize" ]; then
            TITLE="📌 PR에 새 커밋이 푸쉬됐습니다"
            COLOR=10181046
            DESC="[${PR_TITLE}](${PR_URL})"
            EXTRA_NAME=""
            EXTRA_VALUE=""
            RAW_BODY="$PR_BODY"

          else
            TITLE="🔔 새 PR이 열렸습니다!"
            COLOR=5814783
            DESC="[${PR_TITLE}](${PR_URL})"
            EXTRA_NAME=""
            EXTRA_VALUE=""
            RAW_BODY="$PR_BODY"
          fi

          BODY_DISPLAY=$(printf '%s' "$RAW_BODY" \
            | sed '/^```/,/^```/d' \
            | sed 's/`[^`]*`//g' \
            | tr '\n' ' ' \
            | sed 's/  */ /g;s/^ //;s/ $//')
          if [ ${#BODY_DISPLAY} -gt 200 ]; then
            BODY_DISPLAY="${BODY_DISPLAY:0:200}..."
          fi

          PAYLOAD=$(jq -n \
            --arg title "$TITLE" \
            --argjson color "$COLOR" \
            --arg desc "$DESC" \
            --arg author "$PR_AUTHOR" \
            --arg head_ref "$PR_HEAD_REF" \
            --arg base_ref "$PR_BASE_REF" \
            --arg body "$BODY_DISPLAY" \
            --arg extra_name "$EXTRA_NAME" \
            --arg extra_value "$EXTRA_VALUE" \
            '{
              embeds: [{
                title: $title,
                description: $desc,
                color: $color,
                fields: (
                  (if $author != "" then [{"name": "작성자", "value": $author, "inline": true}] else [] end) +
                  (if ($extra_name != "" and $extra_value != "") then [{"name": $extra_name, "value": $extra_value, "inline": true}] else [] end) +
                  (if $head_ref != "" then [{"name": "브랜치", "value": ("`" + $head_ref + "` → `" + $base_ref + "`"), "inline": false}] else [] end) +
                  (if $body != "" then [{"name": "내용", "value": ("||" + $body + "||"), "inline": false}] else [] end)
                ),
                footer: {"text": "GitHub Actions"}
              }]
            }')

          if [ "$DRY_RUN" = "true" ]; then
            echo "[DRY RUN] Discord 알림 생략"
            echo "$PAYLOAD"
          else
            curl -s -H "Content-Type: application/json" \
              -X POST \
              -d "$PAYLOAD" \
              "$DISCORD_WEBHOOK_URL"
          fi
