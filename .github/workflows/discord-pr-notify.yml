name: Discord PR Notification

on:
  pull_request:
    types: [opened, reopened, closed]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Discord 알림 없이 로그만 출력 (테스트용)'
        required: false
        default: 'true'
        type: boolean

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          EVENT="${{ github.event_name }}"
          ACTION="${{ github.event.action }}"
          MERGED="${{ github.event.pull_request.merged }}"
          DRY_RUN="${{ inputs.dry_run }}"

          if [ "$EVENT" = "pull_request" ] && [ "$ACTION" = "closed" ] && [ "$MERGED" = "true" ]; then
            TITLE="✅ PR이 머지됐습니다!"
            COLOR=3066993
            DESC="[${{ github.event.pull_request.title }}](${{ github.event.pull_request.html_url }})"
            EXTRA_FIELD=", { \"name\": \"머지한 사람\", \"value\": \"${{ github.event.pull_request.merged_by.login }}\", \"inline\": true }"
            RAW_BODY="${{ github.event.pull_request.body }}"

          elif [ "$EVENT" = "pull_request" ] && [ "$ACTION" = "closed" ]; then
            exit 0

          elif [ "$EVENT" = "pull_request_review" ]; then
            STATE="${{ github.event.review.state }}"
            if [ "$STATE" = "approved" ]; then
              TITLE="✅ PR이 승인됐습니다!"
              COLOR=3066993
            elif [ "$STATE" = "changes_requested" ]; then
              TITLE="🔁 변경 요청이 달렸습니다"
              COLOR=15158332
            else
              TITLE="💬 PR에 리뷰가 달렸습니다"
              COLOR=16776960
            fi
            DESC="[${{ github.event.pull_request.title }}](${{ github.event.review.html_url }})"
            EXTRA_FIELD=", { \"name\": \"리뷰어\", \"value\": \"${{ github.event.review.user.login }}\", \"inline\": true }"
            RAW_BODY="${{ github.event.review.body }}"

          elif [ "$EVENT" = "pull_request_review_comment" ]; then
            TITLE="💬 PR 코드에 인라인 댓글이 달렸습니다"
            COLOR=16776960
            DESC="[${{ github.event.pull_request.title }}](${{ github.event.comment.html_url }})"
            EXTRA_FIELD=", { \"name\": \"리뷰어\", \"value\": \"${{ github.event.comment.user.login }}\", \"inline\": true }"
            RAW_BODY="${{ github.event.comment.body }}"

          else
            TITLE="🔔 새 PR이 열렸습니다!"
            COLOR=5814783
            DESC="[${{ github.event.pull_request.title }}](${{ github.event.pull_request.html_url }})"
            EXTRA_FIELD=""
            RAW_BODY="${{ github.event.pull_request.body }}"
          fi

          # 코드 블록 제거 + 200자 truncate + 스포일러 처리
          BODY_CLEAN=$(printf '%s' "$RAW_BODY" \
            | sed '/^```/,/^```/d' \
            | sed 's/`[^`]*`//g' \
            | tr '\n' ' ' \
            | sed 's/  */ /g' \
            | sed 's/^ //;s/ $//')
          if [ ${#BODY_CLEAN} -gt 200 ]; then
            BODY_FIELD="||${BODY_CLEAN:0:200}...||"
          elif [ -n "$BODY_CLEAN" ]; then
            BODY_FIELD="||${BODY_CLEAN}||"
          else
            BODY_FIELD=""
          fi

          # body 필드 (내용 있을 때만)
          if [ -n "$BODY_FIELD" ]; then
            BODY_JSON=$(python3 -c "import json,sys; print(json.dumps(sys.argv[1]))" "$BODY_FIELD")
            BODY_FIELD_OBJ=", { \"name\": \"내용\", \"value\": $BODY_JSON, \"inline\": false }"
          else
            BODY_FIELD_OBJ=""
          fi

          PAYLOAD="{
              \"embeds\": [{
                \"title\": \"$TITLE\",
                \"description\": \"$DESC\",
                \"color\": $COLOR,
                \"fields\": [
                  { \"name\": \"작성자\", \"value\": \"${{ github.event.pull_request.user.login }}\", \"inline\": true }
                  $EXTRA_FIELD,
                  { \"name\": \"브랜치\", \"value\": \"\`${{ github.event.pull_request.head.ref }}\` → \`${{ github.event.pull_request.base.ref }}\`\", \"inline\": false },
                  { \"name\": \"리포지토리\", \"value\": \"${{ github.repository }}\", \"inline\": false }
                  $BODY_FIELD_OBJ
                ],
                \"footer\": { \"text\": \"GitHub Actions\" }
              }]
            }"

          if [ "$DRY_RUN" = "true" ]; then
            echo "[DRY RUN] Discord 알림 생략"
            echo "$PAYLOAD"
          else
            curl -H "Content-Type: application/json" \
              -X POST \
              -d "$PAYLOAD" \
              "$DISCORD_WEBHOOK_URL"
          fi
