name: Discord PR Notification

on:
  pull_request:
    types: [opened, reopened, closed]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Discord 알림 없이 로그만 출력 (테스트용)'
        required: false
        default: 'true'
        type: boolean

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_MERGED_BY: ${{ github.event.pull_request.merged_by.login }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          REVIEW_STATE: ${{ github.event.review.state }}
          REVIEW_URL: ${{ github.event.review.html_url }}
          REVIEW_BODY: ${{ github.event.review.body }}
          REVIEW_USER: ${{ github.event.review.user.login }}
          COMMENT_URL: ${{ github.event.comment.html_url }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_USER: ${{ github.event.comment.user.login }}
          GH_EVENT_NAME: ${{ github.event_name }}
          GH_ACTION: ${{ github.event.action }}
          GH_MERGED: ${{ github.event.pull_request.merged }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          EVENT="$GH_EVENT_NAME"
          ACTION="$GH_ACTION"
          MERGED="$GH_MERGED"

          if [ "$EVENT" = "pull_request" ] && [ "$ACTION" = "closed" ] && [ "$MERGED" = "true" ]; then
            TITLE="✅ PR이 머지됐습니다!"
            COLOR=3066993
            DESC="[${PR_TITLE}](${PR_URL})"
            EXTRA_NAME="머지한 사람"
            EXTRA_VALUE="$PR_MERGED_BY"
            RAW_BODY="$PR_BODY"

          elif [ "$EVENT" = "pull_request" ] && [ "$ACTION" = "closed" ]; then
            exit 0

          elif [ "$EVENT" = "pull_request_review" ]; then
            STATE="$REVIEW_STATE"
            if [ "$STATE" = "approved" ]; then
              TITLE="✅ PR이 승인됐습니다!"
              COLOR=3066993
            elif [ "$STATE" = "changes_requested" ]; then
              TITLE="🔁 변경 요청이 달렸습니다"
              COLOR=15158332
            else
              TITLE="💬 PR에 리뷰가 달렸습니다"
              COLOR=16776960
            fi
            DESC="[${PR_TITLE}](${REVIEW_URL})"
            EXTRA_NAME="리뷰어"
            EXTRA_VALUE="$REVIEW_USER"
            RAW_BODY="$REVIEW_BODY"

          elif [ "$EVENT" = "pull_request_review_comment" ]; then
            TITLE="💬 PR 코드에 인라인 댓글이 달렸습니다"
            COLOR=16776960
            DESC="[${PR_TITLE}](${COMMENT_URL})"
            EXTRA_NAME="리뷰어"
            EXTRA_VALUE="$COMMENT_USER"
            RAW_BODY="$COMMENT_BODY"

          else
            TITLE="🔔 새 PR이 열렸습니다!"
            COLOR=5814783
            DESC="[${PR_TITLE}](${PR_URL})"
            EXTRA_NAME=""
            EXTRA_VALUE=""
            RAW_BODY="$PR_BODY"
          fi

          # 코드 블록 제거 + 200자 truncate
          BODY_DISPLAY=$(printf '%s' "$RAW_BODY" \
            | sed '/^```/,/^```/d' \
            | sed 's/`[^`]*`//g' \
            | tr '\n' ' ' \
            | sed 's/  */ /g' \
            | sed 's/^ //;s/ $//')
          if [ ${#BODY_DISPLAY} -gt 200 ]; then
            BODY_DISPLAY="${BODY_DISPLAY:0:200}..."
          fi

          # Python으로 JSON 안전하게 생성
          PAYLOAD=$(NOTIF_TITLE="$TITLE" \
            NOTIF_COLOR="$COLOR" \
            NOTIF_DESC="$DESC" \
            NOTIF_EXTRA_NAME="$EXTRA_NAME" \
            NOTIF_EXTRA_VALUE="$EXTRA_VALUE" \
            NOTIF_BODY="$BODY_DISPLAY" \
            python3 << 'PYEOF'
import json, os

title = os.environ.get('NOTIF_TITLE', '')
color = int(os.environ.get('NOTIF_COLOR', '0'))
desc = os.environ.get('NOTIF_DESC', '')
extra_name = os.environ.get('NOTIF_EXTRA_NAME', '')
extra_value = os.environ.get('NOTIF_EXTRA_VALUE', '')
pr_author = os.environ.get('PR_AUTHOR', '')
pr_head_ref = os.environ.get('PR_HEAD_REF', '')
pr_base_ref = os.environ.get('PR_BASE_REF', '')
body = os.environ.get('NOTIF_BODY', '')

fields = []
if pr_author:
    fields.append({'name': '작성자', 'value': pr_author, 'inline': True})
if extra_name and extra_value:
    fields.append({'name': extra_name, 'value': extra_value, 'inline': True})
if pr_head_ref:
    fields.append({'name': '브랜치', 'value': f'`{pr_head_ref}` → `{pr_base_ref}`', 'inline': False})
if body:
    fields.append({'name': '내용', 'value': f'||{body}||', 'inline': False})

payload = {
    'embeds': [{
        'title': title,
        'description': desc,
        'color': color,
        'fields': fields,
        'footer': {'text': 'GitHub Actions'}
    }]
}
print(json.dumps(payload, ensure_ascii=False))
PYEOF
          )

          if [ "$DRY_RUN" = "true" ]; then
            echo "[DRY RUN] Discord 알림 생략"
            echo "$PAYLOAD"
          else
            curl -s -H "Content-Type: application/json" \
              -X POST \
              -d "$PAYLOAD" \
              "$DISCORD_WEBHOOK_URL"
          fi