# null 체크 대상 필드 목록 — 여기에 등록된 필드만 validate_config()가 검사
_required:
  - model.num_classes
  - data.nc
  - data.names

model:
  name: yolov8n          # yolov8n / yolov8s / yolov8m / yolov8l
  num_classes: null      # EDA 후 확정

data:
  train: data/processed/images/train
  val: data/processed/images/val
  nc: null               # EDA 후 확정
  names: []              # EDA 후 확정

train:
  epochs: 50
  batch_size: 16
  lr: 0.001
  img_size: 640
  seed: 42

paths:
  checkpoint: outputs/checkpoints/
  prediction: outputs/predictions/
  submission: outputs/submissions/
