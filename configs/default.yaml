# null 체크 대상 필드 목록 — 여기에 등록된 필드만 validate_config()가 검사
_required:
  - model.num_classes
  - data.nc
  - data.names
  - data.class_mapping

model:
  name: yolov8n          # yolov8n / yolov8s / yolov8m / yolov8l
  num_classes: null      # class_mapping에서 자동 설정

data:
  class_mapping: configs/class_mapping.json
  nc: null               # class_mapping에서 자동 설정
  names: []              # class_mapping에서 자동 설정

train:
  epochs: 50
  batch_size: 16
  lr: 0.001
  img_size: 640
  seed: 42

paths:
  checkpoint: outputs/checkpoints/
  prediction: outputs/predictions/
  submission: outputs/submissions/

postprocess:
  conf_threshold: 0.25   # predict/submission 용
  iou_threshold: 0.7
  max_detections: 4

eval:
  conf_threshold: 0.001  # mAP 계산 전용 (PR curve 최대 recall 확보)
